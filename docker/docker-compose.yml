services:
  influxdb:
    image: influxdb:2.7
    container_name: ntn-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ntn-toolkit-admin
      DOCKER_INFLUXDB_INIT_ORG: ntn
      DOCKER_INFLUXDB_INIT_BUCKET: ntn
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ntn-toolkit-token
    volumes:
      - influx-data:/var/lib/influxdb2
    # InfluxDB v2 doesn't accept the v1-style udp-bind-address keys we used
    # to ship in influxdb-config.yml — UDP ingest in v2 needs a Telegraf
    # sidecar (see telegraf service below). The bare HTTP API on 8086 is
    # the canonical v2 entry point.

  # Telegraf terminates the UDP line-protocol stream from ns-3 sinks and
  # forwards via the v2 HTTP API to bucket "ntn".
  telegraf:
    image: telegraf:1.31
    container_name: ntn-telegraf
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "8089:8089/udp"
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ntn-grafana
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro

volumes:
  influx-data:
  grafana-data:
