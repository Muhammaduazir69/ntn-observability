[agent]
  interval = "1s"
  flush_interval = "1s"
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  omit_hostname = true

# UDP socket listener — accepts InfluxDB v1 line-protocol from ns-3 sinks.
[[inputs.socket_listener]]
  service_address = "udp://:8089"
  data_format = "influx"
  read_buffer_size = "8MB"

# ns-3 emits timestamps as Simulator::Now() (ns since 1970-01-01 = sim t0).
# That puts every point ~55 years before the InfluxDB retention window,
# so the v2 server drops them. Rewrite each metric's timestamp to the
# Telegraf ingest time, preserving relative ordering at the 1 s flush
# cadence — fine for live dashboards. For exact-time replays, use file
# mode + `influx write`.
[[processors.starlark]]
  source = '''
load("time.star", "time")

def apply(metric):
    metric.time = time.now().unix_nano
    return metric
'''

# Forward to InfluxDB v2.
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "ntn-toolkit-token"
  organization = "ntn"
  bucket = "ntn"
